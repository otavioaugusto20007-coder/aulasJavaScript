<body>
   <h1><mark>MU</mark>DO HTML</h1>
   <hr>

   <form action="#">
    <input type="number" name="num1" id="num1" placeholder="Digite o 1° número required">
   <input type="number" name="num2" id="num2" placeholder="Digite o 2° número required">
   <br>
   <hr>
   <input type="button" value="Adição" onclick="somar()";>
</form>
<div>
    <p><span id="resultado"></span></p>
</div>
<script>
    function somar(){
        let valor1 = document.getElementById('num1')
        let valor2 = document.getElementById('num2')
        let soma = Number(valor1.value) + Number(valor2.value)
        document.getElementById('resultado').innerText = "O resultado é "+soma

    }
</script>

</body>

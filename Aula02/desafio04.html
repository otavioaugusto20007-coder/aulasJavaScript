<body>
    <h1><mark>MANIPULANDO ELEMENTOS (TAGS)</mark>DO HTML ATRAVÉS</h1>
    <hr>

    <div>
        <img src="img/subzero.jpg" alt="mortalkombat">
        <button onclick="mudarImagem()">TROCAR IMAGEM</button>
    </div>

    <script>
        function mudarImagem(){
            const tags_i = document.getElementsByTagName('img');
        console.log(tags_i)
            let tags_i_1 = tags_i[0]
            if(tags_i_1.title=="subzero"){
                tags_i_1.src="img/Scorpion.jpg"
                tags_i_1.title = "Scorpion" 
            
            }else{
                tags_i_1.src="img/subzero.jpg"
                tags_i_1.title = "subzero"       
            }
        }
        
    </script>

</body>
